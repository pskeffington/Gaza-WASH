name: Validate Gaza WASH repo

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate assessment and manuscript gates
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Run Python assessment validator
        run: python3 scripts/validate_assessments.py

      - name: Run R data-frame validator
        run: Rscript analysis/validate_figures_tables.R
